name: Claude review & auto-merge (reusable)

# ⚠️ AI REVIEW IS CURRENTLY DISABLED.
#
# anthropics/claude-code-action@v1 stalls at invocation: the `claude` process
# spawns and emits zero output until the job timeout cancels it (no turns ever
# run, so --max-turns has no effect). Captured via show_full_output on
# norikit/noribar#20 — see the tracking issue. Until that's fixed (pin the
# action/CLI to a known-good version), this reusable is a no-op so it can never
# hang or block a PR. Auto-merge is intentionally NOT performed — merge by hand.
#
# To re-enable: restore the `anthropics/claude-code-action@v1` review step plus
# the "Enable auto-merge if approved" step from git history (and pin a version).

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: false

jobs:
  review-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: AI review disabled
        run: echo "::notice::AI review is disabled (claude-code-action invocation stall). Merge manually."
