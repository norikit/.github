name: Claude Code (reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # The action restores trusted config from origin/main, so the workspace
      # must be a git checkout (otherwise: "fatal: not a git repository").
      - uses: actions/checkout@v4
      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the job's GITHUB_TOKEN so the action skips the OIDC token
          # exchange (which needs `id-token: write` — a reusable workflow can't
          # get it unless every caller also grants the permission).
          github_token: ${{ secrets.GITHUB_TOKEN }}
